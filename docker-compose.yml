services:
  mongo:
    image: mongo:7.0
    container_name: ai-health-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai-health-report-analyzer
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ai-health-network

  redis:
    image: redis:7.4-alpine
    container_name: ai-health-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai-health-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-health-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CLIENT_URL: http://localhost:8080
      APP_URL: http://localhost:8080
      MONGODB_URI: mongodb://mongo:27017/ai-health-report-analyzer
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-true}
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY:-2}
      ASYNC_REPORT_PROCESSING: ${ASYNC_REPORT_PROCESSING:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-1mb}
      UPLOAD_MAX_FILE_SIZE_BYTES: ${UPLOAD_MAX_FILE_SIZE_BYTES:-10485760}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      ENABLE_MALWARE_SCAN: ${ENABLE_MALWARE_SCAN:-false}
      ANTIVIRUS_SCAN_COMMAND: ${ANTIVIRUS_SCAN_COMMAND:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      MONGODB_MAX_RETRIES: ${MONGODB_MAX_RETRIES:-10}
      MONGODB_RETRY_DELAY_MS: ${MONGODB_RETRY_DELAY_MS:-5000}
      MONGODB_MAX_POOL_SIZE: ${MONGODB_MAX_POOL_SIZE:-10}
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: ${MONGODB_SERVER_SELECTION_TIMEOUT_MS:-5000}
      MONGODB_SOCKET_TIMEOUT_MS: ${MONGODB_SOCKET_TIMEOUT_MS:-45000}
      CREATE_INDEXES_ON_STARTUP: ${CREATE_INDEXES_ON_STARTUP:-true}
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      METRICS_USERNAME: ${METRICS_USERNAME:-}
      METRICS_PASSWORD: ${METRICS_PASSWORD:-}
      SHARE_LINK_SECRET: ${SHARE_LINK_SECRET:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5000"
    networks:
      - ai-health-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-health-worker
    command: ["node", "worker.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CLIENT_URL: http://localhost:8080
      APP_URL: http://localhost:8080
      MONGODB_URI: mongodb://mongo:27017/ai-health-report-analyzer
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-true}
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY:-2}
      ASYNC_REPORT_PROCESSING: ${ASYNC_REPORT_PROCESSING:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AI_PROVIDER: ${AI_PROVIDER:-local}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SHARE_LINK_SECRET: ${SHARE_LINK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-health-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ai-health-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - ai-health-network

volumes:
  mongo-data:
  redis-data:

networks:
  ai-health-network:
    driver: bridge
